name: Deploy to HostPapa

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install asset generator dependencies
        run: python -m pip install -r requirements.txt

      - name: Generate assets
        run: npm run generate:assets

      - name: Build
        run: npm run build

      - name: Upload dist to HostPapa
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTPAPA_FTP_HOST }}
          username: ${{ secrets.HOSTPAPA_FTP_USER }}
          password: ${{ secrets.HOSTPAPA_FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./dist/
          server-dir: ${{ secrets.HOSTPAPA_REMOTE_DIR }}
