name: Deploy to HostPapa

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FTP_HOST: ${{ secrets.HOSTPAPA_FTP_HOST }}
      FTP_USER: ${{ secrets.HOSTPAPA_FTP_USER }}
      FTP_PASSWORD: ${{ secrets.HOSTPAPA_FTP_PASSWORD }}
      FTP_REMOTE_DIR: ${{ secrets.HOSTPAPA_REMOTE_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install asset generator dependencies
        run: python -m pip install -r requirements.txt

      - name: Generate assets
        run: npm run generate:assets

      - name: Build
        run: npm run build

      - name: Check deployment secrets
        id: deploy-secrets
        shell: bash
        run: |
          if [[ -n "$FTP_HOST" && -n "$FTP_USER" && -n "$FTP_PASSWORD" && -n "$FTP_REMOTE_DIR" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload dist to HostPapa
        if: steps.deploy-secrets.outputs.ready == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ env.FTP_HOST }}
          username: ${{ env.FTP_USER }}
          password: ${{ env.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./dist/
          server-dir: ${{ env.FTP_REMOTE_DIR }}

      - name: Skip deploy notice
        if: steps.deploy-secrets.outputs.ready != 'true'
        run: echo "Skipping HostPapa deploy because required repository secrets are not configured."
